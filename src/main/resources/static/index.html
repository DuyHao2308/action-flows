<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu bản thân</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #dfe9f3);
            color: #222;
        }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        .profile-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #0d6efd, #3b82f6);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 16px;
            border-radius: 50%;
            background: white;
            color: #0d6efd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: bold;
        }

        .header h1 {
            margin: 10px 0 8px;
            font-size: 32px;
        }

        .header h2 {
            margin: 0;
            font-size: 18px;
            font-weight: normal;
            opacity: 0.95;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 28px;
        }

        .section h3 {
            margin-bottom: 12px;
            color: #0d6efd;
            border-left: 5px solid #0d6efd;
            padding-left: 10px;
        }

        .bio {
            line-height: 1.7;
            font-size: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .info-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
        }

        .info-item strong {
            display: block;
            margin-bottom: 6px;
            color: #333;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .skill-badge {
            background: #e7f1ff;
            color: #0d6efd;
            padding: 10px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
        }

        .project-list {
            display: grid;
            gap: 16px;
        }

        .project-item {
            background: #f8f9fa;
            border-radius: 14px;
            padding: 18px;
            border-left: 5px solid #0d6efd;
        }

        .project-item h4 {
            margin: 0 0 8px;
        }

        .loading {
            text-align: center;
            font-size: 18px;
            padding: 40px;
        }

        .error {
            text-align: center;
            color: red;
            font-size: 18px;
            padding: 40px;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 26px;
            }

            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="profile-card">
        <div class="header">
            <div class="avatar" id="avatar">N</div>
            <h1 id="fullName">Đang tải...</h1>
            <h2 id="title"></h2>
        </div>

        <div class="content" id="content">
            <div class="loading">Đang tải dữ liệu profile...</div>
        </div>
    </div>
</div>

<script>
    async function loadProfile() {
        const content = document.getElementById("content");

        try {
            const response = await fetch("/api/profile");

            if (!response.ok) {
                throw new Error("Không lấy được dữ liệu từ server");
            }

            const data = await response.json();

            document.getElementById("fullName").innerText = data.fullName;
            document.getElementById("title").innerText = data.title;
            document.getElementById("avatar").innerText = data.fullName.charAt(0).toUpperCase();

            const skillsHtml = data.skills
                .map(skill => `<span class="skill-badge">${skill}</span>`)
                .join("");

            const projectsHtml = data.projects
                .map(project => `
                    <div class="project-item">
                        <h4>${project.name}</h4>
                        <p>${project.description}</p>
                    </div>
                `)
                .join("");

            content.innerHTML = `
                <div class="section">
                    <h3>Giới thiệu</h3>
                    <p class="bio">${data.bio}</p>
                </div>

                <div class="section">
                    <h3>Thông tin liên hệ</h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <strong>Email</strong>
                            <span>${data.email}</span>
                        </div>
                        <div class="info-item">
                            <strong>Số điện thoại</strong>
                            <span>${data.phone}</span>
                        </div>
                        <div class="info-item">
                            <strong>Địa chỉ</strong>
                            <span>${data.address}</span>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <h3>Kỹ năng</h3>
                    <div class="skills">
                        ${skillsHtml}
                    </div>
                </div>

                <div class="section">
                    <h3>Dự án</h3>
                    <div class="project-list">
                        ${projectsHtml}
                    </div>
                </div>
            `;
        } catch (error) {
            content.innerHTML = `<div class="error">${error.message}</div>`;
        }
    }

    loadProfile();
</script>
</body>
</html>
